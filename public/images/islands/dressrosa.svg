<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#D70000"/>
    </linearGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D70000" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff4444" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D70000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Rose/flower inspired decorative elements -->
  <!-- Petal shapes in corners -->
  <ellipse cx="50" cy="50" rx="30" ry="15" fill="none" stroke="#ff4444" stroke-width="0.6" opacity="0.2" transform="rotate(45 50 50)"/>
  <ellipse cx="50" cy="50" rx="30" ry="15" fill="none" stroke="#ff4444" stroke-width="0.6" opacity="0.2" transform="rotate(-45 50 50)"/>
  <ellipse cx="550" cy="50" rx="30" ry="15" fill="none" stroke="#ff4444" stroke-width="0.6" opacity="0.2" transform="rotate(45 550 50)"/>
  <ellipse cx="550" cy="50" rx="30" ry="15" fill="none" stroke="#ff4444" stroke-width="0.6" opacity="0.2" transform="rotate(-45 550 50)"/>
  <ellipse cx="50" cy="350" rx="30" ry="15" fill="none" stroke="#ff4444" stroke-width="0.6" opacity="0.2" transform="rotate(45 50 350)"/>
  <ellipse cx="50" cy="350" rx="30" ry="15" fill="none" stroke="#ff4444" stroke-width="0.6" opacity="0.2" transform="rotate(-45 50 350)"/>
  <ellipse cx="550" cy="350" rx="30" ry="15" fill="none" stroke="#ff4444" stroke-width="0.6" opacity="0.2" transform="rotate(45 550 350)"/>
  <ellipse cx="550" cy="350" rx="30" ry="15" fill="none" stroke="#ff4444" stroke-width="0.6" opacity="0.2" transform="rotate(-45 550 350)"/>
  <!-- Horizontal decorative lines -->
  <rect x="0" y="100" width="600" height="1" fill="url(#fade)"/>
  <rect x="0" y="300" width="600" height="1" fill="url(#fade)"/>
  <!-- Central diamond frame -->
  <polygon points="300,110 420,200 300,290 180,200" fill="none" stroke="#ff4444" stroke-width="0.8" opacity="0.15"/>
  <polygon points="300,125 405,200 300,275 195,200" fill="none" stroke="#ff4444" stroke-width="0.5" opacity="0.1"/>
  <!-- Small star accents -->
  <polygon points="150,150 153,158 161,158 155,163 157,171 150,166 143,171 145,163 139,158 147,158" fill="#ff4444" opacity="0.15"/>
  <polygon points="450,250 453,258 461,258 455,263 457,271 450,266 443,271 445,263 439,258 447,258" fill="#ff4444" opacity="0.15"/>
  <!-- Text -->
  <text x="300" y="200" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="4">Dressrosa</text>
  <text x="300" y="240" font-family="Georgia, serif" font-size="18" fill="#ff8888" text-anchor="middle" letter-spacing="6">New World</text>
  <!-- Decorative rule -->
  <line x1="230" y1="255" x2="370" y2="255" stroke="#ff4444" stroke-width="1" opacity="0.35"/>
</svg>